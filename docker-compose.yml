services:

  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    ports:
    - "127.0.0.1:5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: .
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Xmx512m"
      SPRING_PROFILES_ACTIVE : DOCKER
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:

volumes:
  postgres_data:
